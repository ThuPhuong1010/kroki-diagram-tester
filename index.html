<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kroki Diagram Tester — Confluence Ready</title>
  <meta name="description" content="Test Mermaid, PlantUML, GraphViz and 25+ diagram types. Generate Confluence-ready image URLs instantly using Kroki API." />

  <!-- CodeMirror 6 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>

  <!-- fflate (deflate/zlib for Kroki encoding) -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Kroki <span class="logo-accent">Diagram Tester</span></span>
      </div>
      <span class="header-badge">Confluence Ready</span>
    </div>
    <div class="header-right">
      <a href="https://kroki.io" target="_blank" class="header-link">Kroki Docs ↗</a>
      <a href="https://github.com/thuphuong1010/kroki-diagram-tester" target="_blank" class="header-link">GitHub ↗</a>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="select-group">
        <label class="select-label">Diagram Type</label>
        <div class="custom-select-wrapper">
          <select id="diagramType" class="custom-select">
            <optgroup label="⭐ Popular">
              <option value="mermaid">Mermaid</option>
              <option value="plantuml">PlantUML</option>
              <option value="graphviz">GraphViz</option>
              <option value="d2">D2</option>
            </optgroup>
            <optgroup label="UML & Architecture">
              <option value="c4plantuml">C4 Model (PlantUML)</option>
              <option value="structurizr">Structurizr</option>
              <option value="umlet">UMLet</option>
            </optgroup>
            <optgroup label="Data & Process">
              <option value="bpmn">BPMN</option>
              <option value="dbml">DBML (Database)</option>
              <option value="erd">ERD</option>
            </optgroup>
            <optgroup label="Others">
              <option value="excalidraw">Excalidraw</option>
              <option value="wavedrom">WaveDrom</option>
              <option value="nomnoml">Nomnoml</option>
              <option value="pikchr">Pikchr</option>
              <option value="vega">Vega</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="select-group">
        <label class="select-label">Output Format</label>
        <div class="custom-select-wrapper">
          <select id="outputFormat" class="custom-select">
            <option value="svg">SVG (Vector)</option>
            <option value="png">PNG (Raster)</option>
          </select>
        </div>
      </div>

      <div class="select-group">
        <label class="select-label">Templates</label>
        <div class="custom-select-wrapper">
          <select id="templateSelect" class="custom-select">
            <option value="">— Load template —</option>
            <option value="mermaid-flowchart">Mermaid: Flowchart</option>
            <option value="mermaid-sequence">Mermaid: Sequence</option>
            <option value="mermaid-class">Mermaid: Class Diagram</option>
            <option value="mermaid-erd">Mermaid: ERD</option>
            <option value="mermaid-gantt">Mermaid: Gantt</option>
            <option value="mermaid-state">Mermaid: State</option>
            <option value="plantuml-sequence">PlantUML: Sequence</option>
            <option value="plantuml-usecase">PlantUML: Use Case</option>
            <option value="plantuml-component">PlantUML: Component</option>
            <option value="plantuml-deployment">PlantUML: Deployment</option>
            <option value="graphviz-simple">GraphViz: Graph</option>
            <option value="d2-simple">D2: Architecture</option>
          </select>
        </div>
      </div>
    </div>

    <div class="toolbar-right">
      <button class="btn btn-ghost" id="btnClear" title="Clear editor">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
      <button class="btn btn-primary" id="btnRender">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Render
      </button>
    </div>
  </div>

  <!-- Main Content: Split Pane -->
  <main class="main-content">
    <!-- Editor Panel -->
    <div class="panel editor-panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code Editor
        </span>
        <span class="panel-hint">Auto-renders after 600ms</span>
      </div>
      <div class="editor-wrapper">
        <textarea id="codeEditor" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Preview Panel -->
    <div class="panel preview-panel">
      <div class="panel-header">
        <span class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Live Preview
        </span>
        <div class="preview-actions">
          <button class="btn-icon" id="btnZoomOut" title="Zoom out">−</button>
          <span class="zoom-level" id="zoomLabel">100%</span>
          <button class="btn-icon" id="btnZoomIn" title="Zoom in">+</button>
          <button class="btn-icon" id="btnZoomReset" title="Reset zoom">⊡</button>
        </div>
      </div>

      <div class="preview-wrapper" id="previewWrapper">
        <div class="preview-placeholder" id="previewPlaceholder">
          <div class="placeholder-icon">◈</div>
          <p>Write diagram code on the left,<br/>preview will appear here.</p>
        </div>
        <div class="preview-loading" id="previewLoading">
          <div class="spinner"></div>
          <span>Rendering via Kroki...</span>
        </div>
        <div class="preview-error" id="previewError">
          <div class="error-icon">⚠</div>
          <p id="errorMessage">Syntax error in diagram code.</p>
        </div>
        <div class="preview-content" id="previewContent"></div>
      </div>
    </div>
  </main>

  <!-- Output Bar -->
  <footer class="output-bar">
    <div class="output-url-group">
      <label class="output-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Confluence Image URL
      </label>
      <div class="url-display-wrapper">
        <input type="text" id="confluenceUrl" class="url-display" readonly placeholder="Render a diagram to generate URL..." />
        <button class="btn-copy" id="btnCopyUrl" title="Copy URL" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="copyBtnText">Copy</span>
        </button>
      </div>
    </div>

    <div class="output-actions">
      <button class="btn btn-outline" id="btnDownloadSvg" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        SVG
      </button>
      <button class="btn btn-outline" id="btnDownloadPng" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PNG
      </button>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready</span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
